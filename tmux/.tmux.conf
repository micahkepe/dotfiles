####################
### KEY BINDINGS ###
####################

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# reload config file (change file location to your tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# tmux-sessionzier
bind f run-shell "tmux neww ~/dotfiles/tmux/tmux-sessionizer.sh"
# tmux-worktreeizer
# "g" for git ¬Į\_(„ÉĄ)_/¬Į
bind g run-shell "tmux neww ~/dotfiles/tmux/tmux-worktreeizer.sh"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="~/dotfiles/tmux/is-vim.sh '#{pane_tty}'"
bind -n 'C-h' if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n 'C-j' if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n 'C-k' if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n 'C-l' if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# move around windows with Ctrl + Shift + <Left/Right>
# -n is an alias for -T (root table), i.e., don't use prefix first
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Set working directory of session to current path of the current pane
bind-key M-c attach-session -c "#{pane_current_path}"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l
# NOTE: cross-platform yank handled by tmux-yank:
#   https://github.com/tmux-plugins/tmux-yank

#######################
### Quality of Life ###
#######################

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Allow tmux clipboard to copy to system clipboard
set -s set-clipboard on

# Enable passthrough for panes
set -g allow-passthrough on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Ensure full colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Undercurl + underline color support
# https://man.archlinux.org/man/tmux.1.en#terminal-features__
set -as terminal-features ',xterm-ghostty:usstyle'

# Yazi image options: https://yazi-rs.github.io/docs/image-preview/#tmux
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Auto renumber windows on close
set -g renumber-windows on

# Set escape time
set-option -sg escape-time 0

# Enable focus events
set-option -g focus-events on

# Repeat time: how long to wait before repeating a key
set -g repeat-time 1000

# Increase history limit
set -g history-file ~/.tmux-history
set -g history-limit 100000

# Date time format
set -g clock-mode-style 12

# Hyperlinks
set -ga terminal-features "*:hyperlinks"

##############
### POPUPS ###
##############

# NOTE: `fzf ` has native --tmux option: https://github.com/junegunn/fzf/blob/master/ADVANCED.md#--tmux

# Session jumping with `fzf`
bind C-j run-shell "~/dotfiles/tmux/session-fzf.sh"

# Spotify Player w/ `spotify_player`
bind C-p run-shell '
if [ "#{session_name}" = "spotify" ]; then
  tmux display-message "Already in spotify session - use prefix d to detach"
else
  tmux has-session -t spotify 2>/dev/null || tmux new-session -d -s spotify spotify_player
  tmux display-popup -E "tmux attach -t spotify"
fi'

################
## APPEARANCE ##
################

# Yoinked from Jon: https://github.com/jonhoo/configs/blob/c006fbc2b3df960ac309746488d3535df8d9f5df/shell/.tmux.conf#L48-L89
set -g status-right ''
set -g status-right-length 0
set-option -g status-style "fg=#bdae93,bg=#3c3836"
set-window-option -g window-status-style "fg=#bdae93,bg=default"
set-window-option -g window-status-current-style "fg=#fabd2f,bg=default"
set-option -g pane-border-style "fg=#3c3836"
set-option -g pane-active-border-style "fg=#504945"
set-option -g message-style "fg=#d5c4a1,bg=#3c3836"
set-option -g display-panes-active-colour "#b8bb26"
set-option -g display-panes-colour "#fabd2f"
set-window-option -g clock-mode-colour "#b8bb26"
set-window-option -g mode-style "fg=#bdae93,bg=#504945"
set-window-option -g window-status-bell-style "fg=#3c3836,bg=#fb4934"

###########
### TPM ###
###########

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

